defaults:
  - data: default
  - model: default
  - _self_

train:
  max_epochs: 50
  accelerator: auto
  devices: 2                # number of GPUs
  strategy: ddp             # DistributedDataParallel
  precision: 16-mixed
  log_every_n_steps: 10
  enable_progress_bar: true  # kills the biggest RAM drain
  enable_model_summary: false # no need after first run

wandb:
  project: cxr-lung-path
  name: null   # auto-generated if null