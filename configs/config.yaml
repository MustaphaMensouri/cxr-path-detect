defaults:
  - data: default
  - model: default
  - loss: weighted_bce
  - augmentation: light
  - _self_

train:
  max_epochs: 30
  accelerator: auto
  devices: 2                # number of GPUs
  strategy: ddp             # DistributedDataParallel
  precision: 16-mixed
  log_every_n_steps: 50
  enable_progress_bar: true
  enable_model_summary: true
  run_test: false

wandb:
  enabled: true
  project: lung-pathology-multilabel
  entity: mustaphamensouri
  notes: "run baseline on padchest"
  artifact_name: "lung-pathology-classifier"
  tags:
    - padchest